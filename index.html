<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mes heures à la ferme</title>
    <link rel="icon" type="image/png" href="vache.png">
    <link rel="apple-touch-icon" href="vache.png">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-light">

    <div class="container-fluid max-width-mobile p-3">
        <header id="mainHeader" class="app-header shadow-sm mb-3 text-center">
            <div class="d-flex align-items-center justify-content-center mb-2">
                <span style="font-size: 1.5rem;" class="me-2">🚜</span>
                <h1 class="h5 mb-0 fw-bold">Heures à la ferme</h1>
            </div>
            <div class="row align-items-center">
                <div class="col text-center">
                    <small class="d-block opacity-75">Mois</small>
                    <span class="fw-bold fs-4"><span id="totalMois">0.00</span>h</span>
                </div>
                <div class="col-auto p-0">
                    <div class="vr-separator"></div>
                </div>
                <div class="col text-center">
                    <small class="d-block opacity-75">Année</small>
                    <span class="fw-bold fs-4"><span id="totalAnnee">0.00</span>h</span>
                </div>
            </div>
        </header>

        <div class="card shadow-sm mb-3">
            <div class="card-body">
                <h5 class="card-title mb-3 h6 fw-bold text-purple">Ajouter / Modifier</h5>
                <input type="date" id="dateSaisie" class="form-control mb-3">
                
                <div class="row g-2 mb-3">
                    <div class="col-6 p-2 slot-matin rounded-start">
                        <label class="small fw-bold">Matin</label>
                        <input type="time" id="matinDebut" class="form-control form-control-sm mb-1">
                        <input type="time" id="matinFin" class="form-control form-control-sm">
                    </div>
                    <div class="col-6 p-2 slot-soir rounded-end">
                        <label class="small fw-bold">Soir</label>
                        <input type="time" id="soirDebut" class="form-control form-control-sm mb-1">
                        <input type="time" id="soirFin" class="form-control form-control-sm">
                    </div>
                </div>
                <button id="btnEnregistrer" class="btn btn-purple w-100 py-2 fw-bold">Enregistrer la journée</button>
            </div>
        </div>

        <div class="card shadow-sm mb-3 bg-white">
            <div class="card-body p-2">
                <div class="d-flex align-items-center">
                    <label class="me-2 small fw-bold text-nowrap">Consulter :</label>
                    <select id="selectMois" class="form-select form-select-sm border-purple">
                        <option value="actuel">Mois en cours</option>
                        <option value="tout">Tout l'historique</option>
                    </select>
                </div>
            </div>
        </div>

        <div class="d-flex justify-content-between align-items-center mb-2 px-1">
            <h6 class="mb-0 fw-bold">Historique</h6>
            <button id="btnFiltrer" class="btn btn-outline-purple btn-sm">📅</button>
        </div>
        
        <div id="listeHeures">
            </div>

        <button id="btnExport" class="btn btn-outline-secondary w-100 mt-4 btn-sm mb-5 shadow-sm">
            📥 Sauvegarder mes données (Excel/CSV)
        </button>
    </div>

    <script src="script.js"></script>
</body>
</html>
